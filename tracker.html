<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rayhann_Explorer Correos</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#05080f">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#05080f;--s:#0b1120;--s2:#111b32;--bd:#1e2d52;--ac:#e8a308;--ag:rgba(232,163,8,.12);--gn:#10b981;--gd:rgba(16,185,129,.15);--rd:#ef4444;--bl:#3b82f6;--bd2:rgba(59,130,246,.12);--pu:#a855f7;--cy:#06b6d4;--or:#f97316;--tx:#e2e8f0;--t2:#8899b8;--t3:#556b8f;--m:'IBM Plex Mono',monospace;--f:'Instrument Sans',sans-serif}
*{box-sizing:border-box;margin:0;padding:0}body{font-family:var(--f);background:var(--bg);color:var(--tx);min-height:100vh}::placeholder{color:var(--t3)}::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}@keyframes slideIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes bellShake{0%{transform:rotate(0)}15%{transform:rotate(14deg)}30%{transform:rotate(-14deg)}45%{transform:rotate(8deg)}60%{transform:rotate(-8deg)}75%{transform:rotate(3deg)}100%{transform:rotate(0)}}
@keyframes notifSlide{from{transform:translateX(120%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes notifFade{from{opacity:1}to{opacity:0}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.c{background:var(--s);border-radius:14px;border:1px solid var(--bd);padding:20px}.cg{border-color:rgba(232,163,8,.25);box-shadow:0 0 40px var(--ag)}
.st{margin:0 0 14px;font-size:12px;font-weight:700;color:var(--ac);letter-spacing:1.5px;text-transform:uppercase;font-family:var(--m)}
.sl{font-size:10px;color:var(--t3);font-weight:600;letter-spacing:1px;text-transform:uppercase;font-family:var(--m);margin-bottom:4px}
.sv{font-size:17px;font-weight:700;color:var(--tx);font-family:var(--m)}.su{font-size:12px;color:var(--t2);margin-left:3px}
header{padding:16px 24px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;background:linear-gradient(180deg,var(--s),var(--bg))}
main{max-width:960px;margin:0 auto;padding:24px 20px 60px}
.inp{flex:1;padding:14px 18px 14px 42px;background:var(--bg);border:1px solid var(--bd);border-radius:10px;color:var(--tx);font-size:15px;font-family:var(--m);outline:none;width:100%}.inp:focus{border-color:var(--ac)}
.bt{padding:14px 24px;border-radius:10px;background:linear-gradient(135deg,#c4890a,var(--ac));border:none;color:#000;font-size:14px;font-weight:700;cursor:pointer;min-width:130px;box-shadow:0 4px 20px var(--ag)}.bt:disabled{background:var(--s2);color:var(--t3);cursor:wait;box-shadow:none}
.bs{background:var(--s2);border:1px solid var(--bd);border-radius:8px;padding:5px 10px;color:var(--t2);font-size:11px;font-family:var(--m);cursor:pointer}.bs:hover{border-color:var(--ac);color:var(--ac)}
.err{margin-top:12px;padding:10px 14px;border-radius:8px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:var(--rd);font-size:12px;font-family:var(--m)}
.bg{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:1px;font-family:var(--m)}
.bg-D{background:var(--gd);color:var(--gn);border:1px solid rgba(16,185,129,.2)}.bg-I{background:var(--bd2);color:var(--bl);border:1px solid rgba(59,130,246,.2)}.bg-M{background:rgba(136,153,184,.08);color:var(--t2);border:1px solid rgba(136,153,184,.1)}.bg-X{background:rgba(239,68,68,.1);color:var(--rd);border:1px solid rgba(239,68,68,.2)}
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px}.rs{display:flex;flex-direction:column;gap:14px;animation:slideIn .4s ease}
.gauge{width:100%;height:8px;background:var(--s2);border-radius:4px;overflow:hidden}.gauge-fill{height:100%;border-radius:4px;transition:width .5s}
.bell{position:relative;cursor:pointer;font-size:22px;padding:4px}.bell-badge{position:absolute;top:-2px;right:-4px;background:var(--rd);color:#fff;font-size:9px;font-weight:700;min-width:16px;height:16px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:var(--m)}.bell.shake{animation:bellShake .6s ease}
#toasts{position:fixed;top:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px;max-width:360px}
.toast{background:var(--s);border:1px solid var(--bd);border-radius:12px;padding:14px 16px;animation:notifSlide .3s ease;cursor:pointer;box-shadow:0 8px 32px rgba(0,0,0,.5)}.toast.high{border-color:rgba(239,68,68,.3);background:linear-gradient(135deg,var(--s),#1a0a0a)}.toast-exit{animation:notifFade .3s ease forwards}
#notifPanel{display:none;position:fixed;top:0;right:0;width:380px;max-width:100vw;height:100vh;background:var(--bg);border-left:1px solid var(--bd);z-index:9998;overflow-y:auto;padding:20px}
#langOverlay{position:fixed;inset:0;background:rgba(5,8,15,.97);z-index:10000;display:none;align-items:center;justify-content:center;animation:fadeIn .3s}
.lbtn{width:180px;padding:24px 16px;border-radius:16px;background:var(--s);border:2px solid var(--bd);cursor:pointer;text-align:center;transition:all .2s}.lbtn:hover{border-color:var(--ac);transform:scale(1.05);box-shadow:0 0 30px var(--ag)}
.lsw{background:var(--s2);border:1px solid var(--bd);border-radius:6px;padding:2px 8px;color:var(--t2);font-size:10px;font-family:var(--m);cursor:pointer}.lsw:hover{border-color:var(--ac);color:var(--ac)}
</style>
</head>
